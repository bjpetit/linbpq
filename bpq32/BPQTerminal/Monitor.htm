<h3>Monitor TX</h3>
Enables monitoring of transmitted frames.

<h3>Monitor Supervisory</h3>
Selects whether to monitor supervisory frames, or just I frames. 

<h3>Port n</h3>
Enables monitoring of activity on Radio Port n.
