 <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js" integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA==" crossorigin=""></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

<SCRIPT type=text/javascript> 
//<![CDATA[

var Zoom = 2;
var NodesFile = "NodeStatus.txt";
var map;
var mymap, mymap2
var map2;
var SelectedCall = "";
var redicon;
var greenicon;
var pointx;
var point2x;
var Mouse;
var myHtml;
var Selected;
var CodeInfo = "Codes in popup are: A - Winmor, G- Robust Packet, H - V4, I - UZ7HO, M - ARDOP, N - VARA, others Pactor.<br> + connected ! heard W/N Wide or Narrow modes I/O In or Outbound Connects";
 
function initialize()
{	
	newDiv = document.createElement("div");
	newDiv.innerHTML = "<h3>Waiting for Data...</h3>";
	document.body.insertBefore(newDiv, document.getElementById("main"));
	
	Selected = document.createElement("div");
	Selected.id="selcall";
	
	Selected.innerHTML = "<h4>Nothing Selected...</h4>" + CodeInfo;
	document.body.insertBefore(Selected, document.getElementById("detail"));
		
	greenicon = L.icon(
	{
		iconUrl: 'greenmarker.png',
		iconSize:     [15, 20], // size of the icon
		iconAnchor:   [7, 20], // point of the icon which will correspond to marker's location
		popupAnchor:  [-3, -20] // point from which the popup should open relative to the iconAnchor
	});

	redicon = L.icon(
	{
		iconUrl: 'redmarker.png',
		iconSize:     [15, 20], // size of the icon
		iconAnchor:   [7, 20], // point of the icon which will correspond to marker's location
		popupAnchor:  [-3, -20] // point from which the popup should open relative to the iconAnchor
	});
				

	loadMap();
	loadMap2();
	GetData();
}

var layergroup;
var layergroup2;

var latlng = L.latLng(40, -40);
var latlng2 = L.latLng(40, -40);

var Zoom = 2;
var Zoom2 = 2;

function loadMap() {

	mymap = L.map(document.getElementById("map")).setView(latlng, Zoom);

	L.tileLayer('http://tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey=41ab899ed1fd4d09b11da7caf3a48e1f', {
		maxZoom: 18,
		attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, ' +
			'<a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
			'Imagery &copy; <a href="http://thunderforest.com/">thunderforest.com</a>',
		id: 'mapbox.streets'
	}).addTo(mymap);
	
	layergroup = L.layerGroup().addTo(mymap); 
}

 
function loadMap2() {

	mymap2 = L.map(document.getElementById("map2")).setView(latlng2, Zoom2);

		L.tileLayer('http://tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey=41ab899ed1fd4d09b11da7caf3a48e1f', {
		maxZoom: 18,
		attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, ' +
			'<a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
			'Imagery &copy; <a href="http://thunderforest.com/">thunderforest.com</a>',
		id: 'mapbox.streets'
	}).addTo(mymap2);
	
	layergroup2 = L.layerGroup().addTo(mymap2); 
}
 
 
var NodeList;
 
function GetData()
{
	$.ajax({url: "NodeStatus.txt", cache: false})
	.done(function(Nodes){NodeList = Nodes;processData(NodeList);})	
	.fail(function(jqXHR, textStatus, errorThrown){alert("Failed to load Node data");})
//	.always(function() {alert( "finished" );})
	;
 }

function processData(Nodes)
{
  // Save map centre and zoom
	
	latlng = mymap.getCenter();
	Zoom = mymap.getZoom();

  // Remove markers
	
	layergroup.clearLayers();
	layergroup2.clearLayers();
		
	var lines = Nodes.split("|");
	
	var i = 1;

	var infoArea = document.getElementById("sidebar"); 
	var strInfo = '<table>';
 
	var infoArea2 = document.getElementById("sidebar2"); 
	var strInfo2 = '<table>';
	
	// First line is a timestamp
				
	newDiv.innerHTML = "<h4>Last Updated " + lines[0] + "</h4>" + "Note Stations are plotted randomly in the Grid square, and frequencies aee shown as centre, not dial.<br>Calls shown in red have reported HF connections.<br>Click on a Call to zoom in, and show on the lower map the stations that call has heard";
			
	lines.sort();
						
	while(i < lines.length)
	{
		if (lines[i].length < 5)
		{
		   i = i + 1;
		   continue;
		}
				
		var elements = lines[i].split(",")
							
		// Either a Node, or Heard station
				
		if (elements[0].length < 2 || elements[0].length > 12)
		{
			i = i + 1;
			continue;
		}
				
		if (elements[0] == "MH")
		{
			if (elements[1] == SelectedCall || SelectedCall == "")
			{
				var Param = elements[4] + "/" + elements[3]			
				var clink = '<a href=javascript:ZoomTo2("' + Param + '")>' + elements[2] + '</a>';
				var tableRow = '<tr><td>' + clink + '</td></tr>\n';	 
				strInfo2 += tableRow;
										
				L.marker([elements[4], elements[3]] ,{icon: greenicon, title: elements[2]})
				.addTo(layergroup2)
				.bindPopup(elements[2] + '<br>' + elements[6])
				.on('mouseover', function (e) {this.openPopup();})
				.on('mouseout', function (e) {this.closePopup();});
			}  
		}
		else // Node
		{
			// Element 0 is call
					
			var Param = elements[2] + "/" + elements[1] + "/" + elements[0]
					
			if (elements[6] == "1")	
				var clink = '<a href=javascript:ZoomTo("' + Param + '")><font color="#ff0000">' + elements[0] + '</font></a>';
			else
				var clink = '<a href=javascript:ZoomTo("' + Param + '")>' + elements[0] + '</a>';
				
			var tableRow = '<tr><td>' + clink + '</td></tr>\n';	 
					
			strInfo += tableRow;
					
			if (elements[3] == 'redmarker.png')
				var Icon = redicon;
			else
				var Icon  = greenicon;
		
			L.marker([elements[2], elements[1]], {icon: Icon})
			.addTo(layergroup).bindPopup(elements[5])
			.on('mouseover', function (e) {this.openPopup();})
			.on('mouseout', function (e) {this.closePopup();});

			if (elements[0] == SelectedCall)
			{
				L.marker([elements[2], elements[1]], {icon: Icon})
					.addTo(layergroup2).bindPopup(elements[5])
					.on('mouseover', function (e) {this.openPopup();})
					.on('mouseout', function (e) {this.closePopup();});
			}
		}
		i=i+1;
	}
			
	infoArea.innerHTML = strInfo + "</table>"; 
	infoArea2.innerHTML = strInfo2 + "</table>"; 
			
	mymap.setView(latlng);
}

function ZoomTo(LatLon)
{
	var ll = LatLon.split("/")
	SelectedCall = ll[2];
	Selected.innerHTML = "<h3><b>" + SelectedCall + "</b></h3>" + CodeInfo;

	latlng = L.latLng(ll[0], ll[1]);
	Zoom = 7;
	mymap.setView(latlng, Zoom);

	processData(NodeList);
}
 
function ZoomTo2(LatLon)
{
	var ll = LatLon.split("/")

	latlng2 = L.latLng(ll[0], ll[1]);
	Zoom2 = 7;

	mymap2.setView(latlng2, Zoom2);
	
}
// Refresh map every 300 seconds
 
setInterval ( "Refresh()", 300000 );
 
function Refresh ( )
{
	GetData();
}


//]]>
</SCRIPT>
